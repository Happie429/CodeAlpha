{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Address | SproTech</title>

    <link rel="stylesheet" href="{% static 'css/delivery.css' %}">
</head>

<body>

<div class="container">

    <div class="card">
<h5>Your Current Location</h5>

<p id="locationText">
    Detecting your location...
</p>

        <h1>📍 Delivery Address</h1>
<div id="currentLocation" style="margin:15px 0; color:#0d6efd; font-weight:bold;">
    Detecting your location...
</div>

        <form method="POST">
    {% csrf_token %}

            <div class="input-box">
                <label>Full Name</label>
               <input type="text"
       name="full_name"
       placeholder="Enter your full name"
       required>
            </div>

            <div class="input-box">
                <label>Mobile Number</label>
               <input type="text"
       name="phone"
       placeholder="Enter mobile number"
       required>
            </div>

            <div class="input-box">
                <label>Email Address</label>
               <input type="email"
       name="email"
       placeholder="Enter email"
       required>
            </div>

            <div class="input-box">
                <label>Address Line 1</label>
               <input type="text"
       name="address1"
       placeholder="House No., Building Name"
       required>
            </div>

            <div class="input-box">
                <label>Address Line 2</label>
                <input type="text"
       name="address2"
       placeholder="Street, Area, Landmark">
            </div>

            <div class="row">

                <div class="input-box">
                    <label>City</label>
                    <input type="text"
       name="city"
       placeholder="City"
       required>
                </div>

                <div class="input-box">
                    <label>State</label>
                   <input type="text"
       name="state"
       placeholder="State"
       required>
                </div>

            </div>

            <div class="row">

                <div class="input-box">
                    <label>Pincode</label>
                   <input type="text"
       name="pincode"
       placeholder="Pincode"
       required>
                </div>

                <div class="input-box">
                    <label>Country</label>
                    <input type="text"
       name="country"
       value="India">
                </div>

            </div>

            <div class="buttons">

                <a href="/cart/" class="back-btn">
                    ⬅ Back
                </a>

                <a href="/" class="home-btn">
                    🏠 Home
                </a>

                <button class="next-btn">
                    Continue →
                </button>

            </div>

<input type="hidden" name="latitude" id="latitude">
<input type="hidden" name="longitude" id="longitude">
<input type="hidden" id="current_location" name="current_location">

        </form>

    </div>

</div>
<script>
window.onload = function () {

    if (!navigator.geolocation) {
        document.getElementById("locationText").innerHTML =
            "Geolocation is not supported.";
        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lng;

            fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
            .then(response => response.json())
            .then(data => {

                document.getElementById("locationText").innerHTML =
                    "📍 <b>Your Current Location</b><br><br>" +
                    data.display_name;

                document.getElementById("currentLocation").innerHTML =
                    "📍 Your Current Location<br>" +
                    data.display_name;

                document.getElementById("current_location").value =
                    data.display_name;

                document.getElementById("latitude").value = lat;
                document.getElementById("longitude").value = lng;

            });

        },

        function(error){

            document.getElementById("locationText").innerHTML =
                "❌ Location permission denied.";

        }

    );

};
</script>
</body>
</html>
