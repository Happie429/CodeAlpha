<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="/static/css/add_product.css">
</head>
<body>

<div class="container">

    <div class="form-card">

        <h1>Add New Product</h1>

        <p class="subtitle">
            Upload your product to the marketplace
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Product Name</label>
                {{ form.name }}
            </div>

            <div class="form-group">
                <label>Price</label>
                {{ form.price }}
            </div>

            <div class="form-group">
                <label>Description</label>
                {{ form.description }}
            </div>

            <div class="form-group">
                <label>Image URL</label>
                {{ form.image }}
            </div>

            <button type="submit" class="btn">
                Add Product
            </button>

        </form>

    </div>

</div>

</body>
</html>
