<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | SocialSphere</title>

    <link rel="stylesheet" href="css/notifications.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">

        <div class="logo">
            <i class="fa-brands fa-instagram"></i>
            <span>Ime</span>
        </div>

        <a href="index.html" class="menu-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>

        <a href="profile.html" class="menu-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>

        <a href="messages.html" class="menu-item">
            <i class="fa-solid fa-message"></i>
            <span>Messages</span>
        </a>

        <a href="notifications.html" class="menu-item active">
            <i class="fa-solid fa-bell"></i>
            <span>Notifications</span>
        </a>

        <a href="saved.html" class="menu-item">
            <i class="fa-solid fa-bookmark"></i>
            <span>Saved</span>
        </a>

        <a href="settings.html" class="menu-item">
            <i class="fa-solid fa-gear"></i>
            <span>Settings</span>
        </a>

        <a href="login.html" class="menu-item">
            <i class="fa-solid fa-right-from-bracket"></i>
            <span>Logout</span>
        </a>

    </aside>

    <!-- Main -->
    <main class="main">

        <h1>Notifications</h1>

        <div class="notification">

            <img src="https://i.pravatar.cc/50?img=12">

            <div>

                <h3>Rahul started following you.</h3>

                <p>2 minutes ago</p>

            </div>

        </div>

        <div class="notification">

            <img src="https://i.pravatar.cc/50?img=18">

            <div>

                <h3>Priya liked your post ❤️</h3>

                <p>10 minutes ago</p>

            </div>

        </div>

        <div class="notification">

            <img src="https://i.pravatar.cc/50?img=30">

            <div>

                <h3>Aman commented on your photo.</h3>

                <p>1 hour ago</p>

            </div>

        </div>

        <div class="notification">

            <img src="https://i.pravatar.cc/50?img=8">

            <div>

                <h3>Neha mentioned you in a comment.</h3>

                <p>Yesterday</p>

            </div>

        </div>

    </main>

</div>

</body>
</html>
