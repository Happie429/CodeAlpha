<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Messages | Ime</title>

    <link rel="stylesheet" href="css/message.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            <i class="fa-brands fa-instagram"></i>
            SocialSphere
        </div>

        <div class="search-box">
            <input type="text" placeholder="Search users...">
        </div>

    </nav>

    <!-- Main -->

    <div class="container">

        <!-- Left Users -->

        <div class="users">

            <h2>Chats</h2>

            <div id="usersList">

            </div>

        </div>

        <!-- Chat -->

        <div class="chat">

            <div class="chat-header">

                <img
                    id="chatImage"
                    src="https://i.pravatar.cc/100">

                <h3 id="chatName">
                    Select User
                </h3>

            </div>

            <div
                class="messages"
                id="messages">

            </div>

            <div class="send-box">

                <input
                    id="messageInput"
                    type="text"
                    placeholder="Type a message...">

                <button id="sendBtn">

                    <i class="fa-solid fa-paper-plane"></i>

                </button>

            </div>

        </div>

    </div>

    <script src="js/messages.js"></script>

</body>

</html>
